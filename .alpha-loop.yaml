# Alpha Loop configuration
repo: bradtaylorsf/alpha-research
project: 0  # GitHub Project number (find it in your project URL)
agent: claude  # AI agent CLI: claude, codex, opencode, lmstudio, ollama
# model:       # AI model (omit to use agent's default, e.g., opus, gpt-5.4)
label: ready
base_branch: main
auto_merge: true
batch_size: 5
batch: true

# --- Validation commands (Python 3.12 stack per research-agent-implementation-guide.md) ---
# `uv` manages the venv and installs from pyproject.toml on first run, so these
# are safe to run from a clean worktree without manual `pip install -e .`.
#
# test_command runs in two places:
#   1. Preflight (before the agent starts) — must pass on main.
#   2. Validation (after the agent finishes) — gate on the change being correct.
# Keep it fast and deterministic: unit tests only. The agent runs the heavier
# CLI smoke / e2e checks itself per AGENTS.md → "Validation playbook".
test_command: uv run pytest -q

# dev_command is what `alpha-loop verify` would use to start a UI for Playwright.
# Unused while skip_verify is true, but kept pointing at the env health check so
# any manual `alpha-loop verify` still produces a useful signal.
dev_command: uv run research doctor

# setup_command runs once per fresh worktree before the agent starts.
# Bootstraps the venv and editable install so the agent never sees `uv: not found`
# or import errors mid-session. Failures are non-blocking (alpha-loop warns and
# continues), so this is safe even before pyproject.toml exists.
setup_command: uv sync && uv pip install -e .

# This is a Python repo — skip the default `pnpm install` step.
skip_install: true

# CLI/daemon project, no UI to drive with Playwright — skip the verify stage entirely.
skip_verify: true

# Post-pipeline 60s smoke test. Fastest "did we break the CLI" check.
# Runs after every issue completes. Once `research doctor` lands, extend to:
#   smoke_test: uv run research --help && uv run research doctor
smoke_test: uv run research --help

# --- Per-step model routing (cost-aware) ---
# Plan and review get Opus (correctness matters most); implement and learn get
# Sonnet (bulk of token spend, quality is good enough).
pipeline:
  plan:      { model: opus }
  implement: { model: sonnet }
  review:    { model: opus }
  learn:     { model: sonnet }

# Coding harnesses to sync skills/agents to (auto-derived from agent if empty)
harnesses:
  - claude

# --- Safety limits (0 = unlimited) ---
max_issues: 60
max_session_duration: 28800  # 8 hours in seconds
agent_timeout: 3600          # 1 hour per issue (default 1800s = 30m, too short for large refactors)
