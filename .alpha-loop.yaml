# Alpha Loop configuration
repo: bradtaylorsf/alpha-research
project: 0  # GitHub Project number (find it in your project URL)
agent: claude  # AI agent CLI: claude, codex, opencode, lmstudio, ollama
# model:       # AI model (omit to use agent's default, e.g., opus, gpt-5.4)
label: ready
base_branch: main
auto_merge: true
# Batch mode is OFF for the bootstrap phases (issues #1–#3 are sequential
# dependencies — scaffold must land before pyproject, pyproject before
# `research doctor`). Once Phase 1 ships, flip `batch: true` for the
# parallel-friendly later phases (e.g. independent connectors in Phase 3).
batch: false
batch_size: 5

# --- Validation commands (Python 3.12 stack per research-agent-implementation-guide.md) ---
# `uv` manages the venv and installs from pyproject.toml on first run, so these
# are safe to run from a clean worktree without manual `pip install -e .`.
#
# test_command runs in two places:
#   1. Preflight (before the agent starts) — must pass on main. (Disabled below
#      via skip_preflight while bootstrapping; main has no Python project yet.)
#   2. Validation (after the agent finishes) — gate on the change being correct.
#
# `scripts/test.sh` is a tolerant wrapper that treats:
#   - "no pyproject.toml yet" as pass (issues #1–#2 haven't landed)
#   - pytest exit 5 ("no tests collected") as pass (issue #3 hasn't landed)
#   - real test failures (exit 1+) as fail
# Once tests exist, the wrapper is a no-op around `uv run pytest`.
test_command: bash scripts/test.sh

# Preflight runs `test_command` against `main` before each issue starts —
# fails fast if main is broken so the agent never starts on a bad base.
skip_preflight: false

# dev_command is what `alpha-loop verify` would use to start a UI for Playwright.
# This is a CLI/daemon project (no UI), so skip_verify is set below and the
# Playwright stage is bypassed. dev_command stays pointed at `research doctor`
# so a manual `alpha-loop verify` still yields a useful signal (env + LM Studio
# + SQLite reachability).
dev_command: uv run research doctor

# setup_command runs once per fresh worktree before the agent starts.
# Bootstraps the venv, editable install, and Playwright browsers so the agent
# never sees `uv: not found`, missing deps, or "browser not installed" errors
# mid-session. Failures are non-blocking (alpha-loop warns and continues), so
# this is safe even before pyproject.toml or playwright are declared.
# Playwright browsers cache to ~/Library/Caches/ms-playwright (shared across
# worktrees), so the first run downloads ~150MB once and subsequent runs no-op.
setup_command: uv sync 2>/dev/null || true; uv pip install -e . 2>/dev/null || true; uv run playwright install chromium 2>/dev/null || true

# This is a Python repo — skip the default `pnpm install` step.
skip_install: true

# CLI/daemon project, no UI to drive with Playwright. The Playwright UI stage
# is bypassed; per-issue functional verification happens via `smoke_test` below.
skip_verify: true

# Post-pipeline smoke test runs after every issue completes. Three layers:
#   1. CLI surface still parses (`research --help` returns 0)
#   2. Doctor sees the env in JSON mode (no TTY-dependent Rich rendering)
#   3. Core orchestrator + CLI tests still pass
# A connector that needs an API key whose key isn't set should `exit 0`
# with a "would need <ENV_VAR>; live test skipped" message — that lets the
# smoke pass even when keys aren't configured yet (see docs/API_KEYS.md).
# Date-boundary CLI tests are deselected because they flake during a UTC
# rollover; they're not exercising production behavior.
smoke_test: |
  uv run research --help > /dev/null && \
  uv run research doctor --json > /dev/null && \
  uv run pytest -q tests/test_orchestrator_loop.py tests/test_orchestrator_plan.py tests/test_cli.py --deselect tests/test_cli.py::test_start_skip_intake_creates_job --deselect tests/test_cli.py::test_start_runs_intake_when_not_skipped 2>&1 | tail -3

# --- Per-step model routing (cost-aware) ---
# Plan and review get Opus (correctness matters most); implement and learn get
# Sonnet (bulk of token spend, quality is good enough).
pipeline:
  plan:      { model: opus }
  implement: { model: sonnet }
  review:    { model: opus }
  learn:     { model: sonnet }

# Coding harnesses to sync skills/agents to (auto-derived from agent if empty)
harnesses:
  - claude

# --- Safety limits (0 = unlimited) ---
# Goal: drain the entire 45-issue backlog overnight. Realistic completion is
# 15–30 issues depending on per-issue complexity; the loop continues past any
# single failure (failed issues get the `failed` label, loop moves on), so
# leaving session_duration unlimited maximizes throughput without losing safety.
max_issues: 60                # cap on issues per session — more than the current backlog
max_session_duration: 0       # unlimited; loop exits when queue is drained or interrupted
agent_timeout: 3600           # 1h per-issue cap stays in place (per-issue safety net)
