# Model tier → provider routing (research-agent-implementation-guide.md §8.1).
#
# The router reads this at startup and maps logical tiers to (provider, model)
# pairs. Edit freely; never hardcode a model name in business logic — pick a
# tier. Local tiers go through LM Studio at http://localhost:1234/v1; cloud
# tiers go through OpenRouter at https://openrouter.ai/api/v1.

tiers:
  fast:
    provider: lmstudio
    model: josiefied-qwen3-4b-instruct-2507-abliterated-v2
    timeout_s: 30
    fallback_tier: frontier_speed
    purpose: |
      Classification, deduplication, language detection, simple
      relevance scoring. ~100 tok/s on M-series.

  general:
    provider: lmstudio
    model: qwen3.6-35b-a3b-holo3-qwopus-instruct-qx64-hi-mlx
    timeout_s: 90
    fallback_tier: frontier_speed
    purpose: |
      Research worker default. Query rewriting, source extraction,
      per-source summarization, finding generation.

  reasoner:
    provider: lmstudio
    model: deepseek-r1-distill-qwen-32b
    timeout_s: 300
    fallback_tier: frontier
    purpose: |
      Complex extraction, hypothesis ranking, contradiction detection.
      Use sparingly.

  vision:
    provider: lmstudio
    model: deepseek-ocr-2
    timeout_s: 60
    fallback_tier: frontier_speed
    purpose: PDF page screenshots, chart reading.

  # `embeddings` intentionally omits `fallback_tier`: no cloud tier in this
  # config exposes an embeddings-shaped endpoint, so a swap stall here must
  # surface as a hard error rather than silently rerouting to a chat model.
  embeddings:
    provider: lmstudio
    model: qwen3-embedding-4b-dwq
    timeout_s: 60
    purpose: Semantic search across findings and sources.

  frontier:
    provider: openrouter
    model: anthropic/claude-opus-4-7
    fallback_model: openai/gpt-5
    timeout_s: 600
    purpose: |
      Major synthesis, critique, final report, planner rewrites.
      Cost-tracked.

  frontier_alt:
    provider: openrouter
    model: moonshotai/kimi-k2-1t
    timeout_s: 600
    purpose: |
      Diverse second opinion. Use for the critique pass so the
      synthesizer and critic disagree productively.

  frontier_speed:
    provider: openrouter
    model: anthropic/claude-haiku-4-5
    timeout_s: 60
    purpose: |
      Fast cloud calls when a local model isn't enough but Opus is
      overkill. Adaptive intake follow-ups, micro-summaries.

# Per-cloud-tier list prices (USD per 1M tokens). Manually maintained — the
# OpenRouter pricing API is a future-deps item. Update whenever the upstream
# provider changes a list price; `BudgetTracker.charge` reads this block to
# compute cost from token counts. Local tiers omit pricing (cost is $0).
pricing:
  frontier:
    input_usd_per_mtok: 15.00
    output_usd_per_mtok: 75.00
  frontier_alt:
    input_usd_per_mtok: 0.60
    output_usd_per_mtok: 2.50
  frontier_speed:
    input_usd_per_mtok: 1.00
    output_usd_per_mtok: 5.00
